<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="../media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="../media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="../media/images/Icon.png">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="A Letter in the Scroll">
    <meta property="og:title" content="You've Been Invited to a Chavruta">
    <meta property="og:description" content="Join your partner for a deep-dive study session. Click to accept your invitation and start learning.">
    <meta property="og:image" content="https://sillybob123.github.io/media/images/chavruta-invite-card-1200x630.jpg">
    <meta property="og:image:secure_url" content="https://sillybob123.github.io/media/images/chavruta-invite-card-1200x630.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="You've been invited to a Chavruta">
    <meta property="og:url" content="https://sillybob123.github.io/join/index.html">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="You've Been Invited to a Chavruta">
    <meta name="twitter:description" content="Join your partner for a deep-dive study session. Click to accept your invitation and start learning.">
    <meta name="twitter:image" content="https://sillybob123.github.io/media/images/chavruta-invite-card-1200x630.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: #19223d;
            background:
                radial-gradient(circle at 8% 12%, rgba(55, 105, 214, 0.20), transparent 36%),
                radial-gradient(circle at 90% 16%, rgba(205, 162, 66, 0.22), transparent 34%),
                linear-gradient(160deg, #f7fbff 0%, #eef4fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .join-shell {
            width: min(920px, 100%);
            border: 1px solid rgba(25, 49, 115, 0.12);
            border-radius: 32px;
            overflow: hidden;
            background:
                radial-gradient(circle at 86% 12%, rgba(205, 162, 66, 0.16), transparent 38%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 251, 255, 0.98));
            box-shadow: 0 26px 70px rgba(20, 42, 95, 0.15);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr minmax(200px, 260px);
            gap: 24px;
            padding: 38px 40px;
        }

        .eyebrow {
            display: inline-block;
            font-weight: 700;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #1b3f8d;
            background: rgba(40, 87, 190, 0.10);
            border: 1px solid rgba(40, 87, 190, 0.22);
            padding: 7px 11px;
            border-radius: 999px;
        }

        h1 {
            margin: 16px 0 10px;
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.12;
            color: #13285f;
        }

        .lead {
            margin: 0;
            max-width: 48ch;
            color: #3b4a67;
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .invite-code {
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(183, 135, 30, 0.28);
            background: rgba(249, 238, 211, 0.62);
            color: #946910;
            font-weight: 700;
            letter-spacing: 0.08em;
            font-size: 0.82rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hero-art {
            align-self: center;
            justify-self: center;
            width: 220px;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            border: 1px solid rgba(22, 44, 104, 0.16);
            background:
                radial-gradient(circle at 70% 20%, rgba(205, 162, 66, 0.26), transparent 42%),
                linear-gradient(170deg, rgba(255, 255, 255, 0.95), rgba(237, 245, 255, 0.98));
            display: grid;
            place-items: center;
            box-shadow: 0 18px 36px rgba(15, 33, 79, 0.16);
        }

        .hero-art img {
            width: 148px;
            height: 148px;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 10px 22px rgba(21, 44, 109, 0.22);
        }

        .actions {
            border-top: 1px solid rgba(16, 37, 93, 0.10);
            padding: 24px 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 14px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 0 28px;
            border-radius: 999px;
            border: 1px solid rgba(202, 166, 77, 0.48);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            color: #ffffff;
            background: linear-gradient(135deg, #c89a35, #b7871e);
            box-shadow: 0 14px 26px rgba(167, 120, 21, 0.32);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(167, 120, 21, 0.38);
        }

        .link-login {
            text-decoration: none;
            color: #1b3f8d;
            font-weight: 600;
        }

        .link-login:hover {
            text-decoration: underline;
        }

        @media (max-width: 760px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 30px 24px 20px;
                gap: 16px;
            }

            .actions {
                padding: 20px 24px 26px;
            }

            .hero-art {
                width: 170px;
                border-radius: 24px;
            }

            .hero-art img {
                width: 118px;
                height: 118px;
            }

            .btn-primary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="join-shell">
        <section class="hero">
            <div>
                <span id="invite-status" class="eyebrow">Invitation Found</span>
                <h1 id="invite-title">You've been invited! Connect your mind with a partner.</h1>
                <p id="invite-description" class="lead">
                    Join a chavruta, explore Torah together, and build a meaningful learning rhythm.
                </p>
                <div id="invite-code" class="invite-code" hidden></div>
            </div>
            <div class="hero-art">
                <img src="../media/images/IconOnly.png" alt="Chavruta logo">
            </div>
        </section>

        <section class="actions">
            <a id="signup-cta" class="btn-primary" href="../index.html">Sign Up to Join</a>
            <a id="login-cta" class="link-login" href="../index.html">Already have an account? Log In</a>
        </section>
    </main>

    <script>
        (function () {
            const INVITE_CODE_LENGTH = 16;
            const params = new URLSearchParams(window.location.search);
            const inviteStatus = document.getElementById('invite-status');
            const inviteTitle = document.getElementById('invite-title');
            const inviteDescription = document.getElementById('invite-description');
            const inviteCodeEl = document.getElementById('invite-code');
            const signupCta = document.getElementById('signup-cta');
            const loginCta = document.getElementById('login-cta');

            function sanitizeInviteCode(value) {
                if (typeof value !== 'string') {
                    return '';
                }
                return value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, INVITE_CODE_LENGTH);
            }

            function inviteCodeFromPath() {
                const parts = window.location.pathname.split('/').filter(Boolean);
                const joinIndex = parts.lastIndexOf('join');
                if (joinIndex === -1 || parts.length <= joinIndex + 1) {
                    return '';
                }
                const candidate = parts[joinIndex + 1];
                if (!candidate || candidate.toLowerCase() === 'index.html') {
                    return '';
                }
                return candidate;
            }

            const fromQuery = params.get('invite') || '';
            const fromPath = inviteCodeFromPath();
            const inviteCode = sanitizeInviteCode(fromQuery || fromPath);

            if (inviteCode.length === INVITE_CODE_LENGTH) {
                const signUpTarget = new URL('../index.html', window.location.href);
                signUpTarget.searchParams.set('invite', inviteCode);
                signUpTarget.searchParams.set('auth', 'create');

                const loginTarget = new URL('../index.html', window.location.href);
                loginTarget.searchParams.set('invite', inviteCode);
                loginTarget.searchParams.set('auth', 'signin');

                signupCta.href = signUpTarget.toString();
                loginCta.href = loginTarget.toString();
                inviteCodeEl.hidden = false;
                inviteCodeEl.textContent = 'Invite Code: ' + inviteCode;
                return;
            }

            inviteStatus.textContent = 'Invite Missing';
            inviteStatus.style.color = '#8b1f1f';
            inviteStatus.style.background = 'rgba(190, 51, 51, 0.10)';
            inviteStatus.style.borderColor = 'rgba(190, 51, 51, 0.25)';
            inviteTitle.textContent = 'This invitation link appears incomplete.';
            inviteDescription.textContent = 'Please ask your chavruta leader for a fresh invite link, then try again.';
            signupCta.textContent = 'Go to Home';
            signupCta.href = '../index.html';
            loginCta.href = '../index.html';
        })();
    </script>
</body>
</html>
