<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You've Been Invited to a Chavruta</title>
    <meta name="description" content="Join your partner for a deep-dive study session. Click to accept your invitation and start learning.">
    <link rel="canonical" href="https://www.aletterinthescroll.com/join">

    <!-- Favicons & Apple Touch -->
    <link rel="icon" type="image/png" sizes="196x196" href="/media/images/Icon.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/media/images/Icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/media/images/Icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A Letter in the Scroll">

    <!-- Open Graph — forces large card in iMessage, Facebook, etc. -->

    <meta property="og:site_name" content="A Letter in the Scroll">
    <meta property="og:title" content="You've Been Invited to a Chavruta">
    <meta property="og:description" content="&quot;When two sit together and words of Torah pass between them, the Divine Presence rests between them.&quot; - Pirkei Avot 3:2">
    <meta property="og:image" content="https://www.aletterinthescroll.com/media/images/chavruta-invite-card-1200x630-v6.jpg">
    <meta property="og:image:secure_url" content="https://www.aletterinthescroll.com/media/images/chavruta-invite-card-1200x630-v6.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="You've been invited to join a Chavruta — Accept Invitation">
    <meta property="og:url" content="https://www.aletterinthescroll.com/join">

    <!-- Twitter / iMessage large image card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="You've Been Invited to a Chavruta">
    <meta name="twitter:description" content="&quot;When two sit together and words of Torah pass between them, the Divine Presence rests between them.&quot; - Pirkei Avot 3:2">
    <meta name="twitter:image" content="https://www.aletterinthescroll.com/media/images/chavruta-invite-card-1200x630-v6.jpg">
    <meta name="twitter:image:alt" content="You've been invited to join a Chavruta — Accept Invitation">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
            --navy: #13285f;
            --navy-light: #1b3f8d;
            --gold: #c89a35;
            --gold-dark: #b7871e;
            --surface: #f7fbff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
            color: #19223d;
            background:
                radial-gradient(ellipse 90% 60% at 8% 12%, rgba(55, 105, 214, 0.18), transparent),
                radial-gradient(ellipse 80% 50% at 90% 16%, rgba(205, 162, 66, 0.18), transparent),
                linear-gradient(160deg, var(--surface) 0%, #eef4fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Main card ── */
        .join-shell {
            width: min(920px, 100%);
            border: 1px solid rgba(25, 49, 115, 0.10);
            border-radius: 32px;
            overflow: hidden;
            background:
                radial-gradient(circle at 86% 12%, rgba(205, 162, 66, 0.12), transparent 38%),
                linear-gradient(180deg, rgba(255,255,255,0.97), rgba(246,251,255,0.98));
            box-shadow:
                0 1px 3px rgba(20, 42, 95, 0.06),
                0 12px 32px rgba(20, 42, 95, 0.10),
                0 28px 72px rgba(20, 42, 95, 0.12);
            animation: cardIn 0.5s ease-out both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Hero section ── */
        .hero {
            display: grid;
            grid-template-columns: 1fr minmax(200px, 260px);
            gap: 32px;
            padding: 44px 44px 36px;
        }

        .hero-copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            font-weight: 700;
            letter-spacing: 0.14em;
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--navy-light);
            background: rgba(40, 87, 190, 0.08);
            border: 1px solid rgba(40, 87, 190, 0.18);
            padding: 7px 13px;
            border-radius: 999px;
        }

        .eyebrow-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 6px rgba(52, 211, 153, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        h1 {
            margin: 18px 0 12px;
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 1.12;
            color: var(--navy);
        }

        .lead {
            max-width: 48ch;
            color: #475569;
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .invite-code {
            margin-top: 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            border-radius: 12px;
            border: 1px solid rgba(183, 135, 30, 0.24);
            background: rgba(249, 238, 211, 0.55);
            color: #946910;
            font-weight: 700;
            letter-spacing: 0.07em;
            font-size: 0.8rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            width: fit-content;
        }

        .invite-code svg {
            width: 14px; height: 14px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        /* ── Hero art (logo) ── */
        .hero-art {
            align-self: center;
            justify-self: center;
            width: 230px;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            border: 1px solid rgba(22, 44, 104, 0.12);
            background:
                radial-gradient(circle at 65% 25%, rgba(205, 162, 66, 0.20), transparent 42%),
                radial-gradient(circle at 30% 70%, rgba(55, 105, 214, 0.12), transparent 40%),
                linear-gradient(170deg, rgba(255,255,255,0.95), rgba(237,245,255,0.98));
            display: grid;
            place-items: center;
            box-shadow:
                0 2px 6px rgba(15, 33, 79, 0.08),
                0 16px 40px rgba(15, 33, 79, 0.14);
            position: relative;
            overflow: hidden;
        }

        .hero-art::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-art img {
            width: 152px;
            height: 152px;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(21, 44, 109, 0.20);
            position: relative;
            z-index: 1;
        }

        /* ── Actions ── */
        .actions {
            border-top: 1px solid rgba(16, 37, 93, 0.08);
            padding: 28px 44px 36px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 54px;
            padding: 0 32px;
            border-radius: 999px;
            border: none;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            color: #ffffff;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            box-shadow:
                0 2px 4px rgba(167, 120, 21, 0.15),
                0 12px 28px rgba(167, 120, 21, 0.28);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow:
                0 4px 8px rgba(167, 120, 21, 0.18),
                0 18px 36px rgba(167, 120, 21, 0.34);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary svg {
            width: 18px; height: 18px;
        }

        .link-login {
            text-decoration: none;
            color: var(--navy-light);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.15s ease;
        }

        .link-login:hover {
            color: var(--navy);
            text-decoration: underline;
        }

        /* ── Footer ── */
        .join-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.78rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .join-footer a {
            color: #64748b;
            text-decoration: none;
        }

        .join-footer a:hover {
            text-decoration: underline;
        }

        /* ── Error state ── */
        .eyebrow--error {
            color: #991b1b;
            background: rgba(220, 38, 38, 0.08);
            border-color: rgba(220, 38, 38, 0.20);
        }

        .eyebrow--error .eyebrow-dot {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
            animation: none;
        }

        /* ── Responsive ── */
        @media (max-width: 760px) {
            body { padding: 16px; }

            .hero {
                grid-template-columns: 1fr;
                padding: 30px 24px 22px;
                gap: 20px;
                text-align: center;
            }

            .hero-copy {
                align-items: center;
            }

            .eyebrow { margin: 0 auto; }

            h1 { text-align: center; }

            .lead {
                text-align: center;
                margin: 0 auto;
            }

            .invite-code { margin: 16px auto 0; }

            .hero-art {
                width: 180px;
                border-radius: 24px;
                order: -1;
            }

            .hero-art img {
                width: 120px;
                height: 120px;
            }

            .actions {
                padding: 22px 24px 28px;
                align-items: center;
            }

            .btn-primary {
                width: 100%;
            }

            .link-login {
                align-self: center;
            }
        }
    </style>
</head>
<body>
    <main class="join-shell">
        <section class="hero">
            <div class="hero-copy">
                <span id="invite-status" class="eyebrow">
                    <span class="eyebrow-dot"></span>
                    Invitation Found
                </span>
                <h1 id="invite-title">You've been invited!<br>Connect your mind with a partner.</h1>
                <p id="invite-description" class="lead">
                    Join a chavruta, explore Torah together, and build a meaningful learning rhythm with your study partner.
                </p>
                <div id="invite-code" class="invite-code" hidden>
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                    <span id="invite-code-text"></span>
                </div>
            </div>
            <div class="hero-art">
                <img src="../media/images/IconOnly.png" alt="A Letter in the Scroll logo" width="152" height="152" loading="eager">
            </div>
        </section>

        <section class="actions">
            <a id="signup-cta" class="btn-primary" href="/">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
                Sign Up to Join
            </a>
            <a id="login-cta" class="link-login" href="/">Already have an account? <strong>Log In</strong></a>
        </section>
    </main>

    <footer class="join-footer">
        <a href="/">A Letter in the Scroll</a> &mdash; Interactive Torah Study
    </footer>

    <script>
        (function () {
            var INVITE_CODE_LENGTH = 16;
            var params = new URLSearchParams(window.location.search);
            var inviteStatus = document.getElementById('invite-status');
            var inviteTitle = document.getElementById('invite-title');
            var inviteDescription = document.getElementById('invite-description');
            var inviteCodeEl = document.getElementById('invite-code');
            var inviteCodeText = document.getElementById('invite-code-text');
            var signupCta = document.getElementById('signup-cta');
            var loginCta = document.getElementById('login-cta');

            function sanitizeInviteCode(value) {
                if (typeof value !== 'string') return '';
                return value.replace(/[^A-Za-z0-9]/g, '').slice(0, INVITE_CODE_LENGTH);
            }

            function inviteCodeFromPath() {
                var parts = window.location.pathname.split('/').filter(Boolean);
                var joinIndex = parts.lastIndexOf('join');
                if (joinIndex === -1 || parts.length <= joinIndex + 1) return '';
                var candidate = parts[joinIndex + 1];
                if (!candidate || candidate.toLowerCase() === 'index.html') return '';
                return candidate;
            }

            var fromQuery = params.get('invite') || '';
            var fromPath = inviteCodeFromPath();
            var inviteCode = sanitizeInviteCode(fromQuery || fromPath);

            if (inviteCode.length === INVITE_CODE_LENGTH) {
                var signUpTarget = new URL('/', window.location.origin);
                signUpTarget.searchParams.set('invite', inviteCode);
                signUpTarget.searchParams.set('auth', 'create');

                var loginTarget = new URL('/', window.location.origin);
                loginTarget.searchParams.set('invite', inviteCode);
                loginTarget.searchParams.set('auth', 'signin');

                signupCta.href = signUpTarget.toString();
                loginCta.href = loginTarget.toString();
                inviteCodeEl.hidden = false;
                inviteCodeText.textContent = inviteCode;
                return;
            }

            // No valid invite code — show error state
            inviteStatus.className = 'eyebrow eyebrow--error';
            inviteStatus.innerHTML = '<span class="eyebrow-dot"></span> Invite Missing';
            inviteTitle.textContent = 'This invitation link appears incomplete.';
            inviteDescription.textContent = 'Please ask your chavruta leader for a fresh invite link, then try again.';
            signupCta.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a2 2 0 110-4 2 2 0 010 4z"/></svg> Go to Home';
            signupCta.href = '../index.html';
            loginCta.href = '../index.html';
        })();
    </script>
    <script src="/js/auth-gate.js"></script>
</body>
</html>
