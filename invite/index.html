    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", system-ui, sans-serif;
            display: grid;
            place-items: center;
            background:
                radial-gradient(ellipse 80% 60% at 18% 16%, rgba(56, 95, 186, 0.22), transparent),
                radial-gradient(ellipse 70% 50% at 86% 18%, rgba(201, 160, 63, 0.20), transparent),
                linear-gradient(160deg, #f6faff 0%, #eef3fb 100%);
            color: #1f2a44;
            padding: 24px;
        }

        .card {
            width: min(540px, 100%);
            border: 1px solid rgba(26, 52, 117, 0.10);
            border-radius: 28px;
            padding: 36px 28px 32px;
            text-align: center;
            background:
                radial-gradient(circle at 82% 16%, rgba(201, 160, 63, 0.12), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.97), rgba(248,252,255,0.98));
            box-shadow:
                0 1px 2px rgba(20,41,88,0.06),
                0 8px 24px rgba(20,41,88,0.10),
                0 24px 56px rgba(20,41,88,0.12);
        }

        .logo {
            width: 88px; height: 88px;
            border-radius: 24px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(22,40,94,0.22);
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            font-size: clamp(1.5rem, 3.2vw, 2rem);
            line-height: 1.2;
            color: #16285e;
            font-family: "Cormorant Garamond", Georgia, serif;
        }

        .desc {
            margin: 14px auto 0;
            max-width: 42ch;
            line-height: 1.65;
            color: #475569;
            font-size: 0.98rem;
        }

        .spinner-row {
            margin-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #64748b;
            font-size: 0.88rem;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(30,60,140,0.15);
            border-top-color: #2857be;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .cta {
            display: inline-block;
            margin-top: 22px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            background: linear-gradient(135deg, #c89a35, #b7871e);
            padding: 13px 28px;
            border-radius: 999px;
            box-shadow: 0 10px 22px rgba(168,123,22,0.28);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(168,123,22,0.35);
        }

        .sub {
            margin-top: 14px;
            font-size: 0.82rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <main class="card">
        <img class="logo" src="/media/images/Icon.png" alt="A Letter in the Scroll logo" width="88" height="88">
        <h1>You've Been Invited to Join a Chavruta</h1>
        <p class="desc">Opening your invite now. Study Torah together, share insights, and grow with your learning group.</p>
        <div class="spinner-row">
            <div class="spinner" aria-hidden="true"></div>
            <span>Redirecting&hellip;</span>
        </div>
        <a id="open-link" class="cta" href="/join">Open Invite</a>
        <p class="sub">If you are not redirected automatically, tap "Open Invite".</p>
    </main>

    <script>
        (function () {
            var INVITE_CODE_LENGTH = 16;
            var params = new URLSearchParams(window.location.search);
            var rawInvite = params.get('invite') || '';

            function sanitizeInviteCode(value) {
                if (typeof value !== 'string') return '';
                return value.replace(/[^A-Za-z0-9]/g, '').slice(0, INVITE_CODE_LENGTH);
            }

            var code = sanitizeInviteCode(rawInvite);
            var target = new URL('/join', window.location.origin);
            target.searchParams.set('card', 'v5');

            if (code.length === INVITE_CODE_LENGTH) {
                target.searchParams.set('invite', code);
            }

            document.getElementById('open-link').href = target.toString();

            // Redirect via JS instead of meta refresh — more reliable for crawlers
            setTimeout(function () {
                window.location.replace(target.toString());
            }, 1200);
        })();
    </script>
    <script src="/js/auth-gate.js"></script>
</body>
</html>
