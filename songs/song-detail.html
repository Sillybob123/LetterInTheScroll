<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song and Poem Details - A Letter in the Scroll</title>
    <link rel="icon" type="image/png" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" href="/media/images/Icon.png">

    <!-- Open Graph / iMessage / Social Link Preview -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="A Letter in the Scroll">
    <meta property="og:title" content="Songs and Poems - A Letter in the Scroll">
    <meta property="og:description" content="Listen, reflect, read, and sing. Explore songs and poems that celebrate faith, hope, and the journey of the soul.">
    <meta property="og:image" content="https://www.aletterinthescroll.com/media/images/welcome.jpg">
    <meta property="og:url" content="https://www.aletterinthescroll.com/songs/song-detail.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Songs and Poems - A Letter in the Scroll">
    <meta name="twitter:description" content="Listen, reflect, read, and sing. Explore songs and poems that celebrate faith, hope, and the journey of the soul.">
    <meta name="twitter:image" content="https://www.aletterinthescroll.com/media/images/welcome.jpg">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shabbat.css">
    <link rel="stylesheet" href="/css/mobile-overrides.css">
    <link rel="stylesheet" href="/css/song-detail-style.css">
    <link rel="stylesheet" href="/css/tailwind-utilities.css">
</head>
<body class="bg-gray-50 min-h-screen" data-enable-text-size="true" data-header-fallback="true">

    <!-- Professional Responsive Header -->
    <div id="shared-header-mount" style="background:linear-gradient(135deg,#0c1a3e 0%,#16285e 45%,#1e3a8a 100%);min-height:64px"></div>
    <script src="/js/shared-header.js"></script>

    <!-- Community Status Bar -->
    <div id="community-status-bar" class="hidden bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-blue-200">
        <div class="container mx-auto">
            <div id="community-status-content" class="flex flex-wrap items-center gap-4 text-sm text-gray-700">
                <div id="header-online-section" class="status-section hidden flex items-center gap-1.5">
                    <div class="flex items-center gap-1">
                        <div class="status-leading-dot bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-xs font-medium text-gray-700">Online:</span>
                    </div>
                    <span id="header-online-concurrency" class="status-concurrency hidden"></span>
                    <div id="header-online-users-list" class="status-scroll flex flex-nowrap items-center gap-1.5 overflow-x-auto"></div>
                </div>
                <div id="header-your-status" class="status-section hidden flex items-center gap-1 ml-auto">
                    <span id="header-your-username" class="text-xs font-medium text-gray-800"></span>
                    <span class="text-xs text-gray-400">&bull;</span>
                    <span id="header-your-login-time" class="text-xs text-gray-600">just now</span>
                </div>
            </div>
        </div>
    </div>
    <!-- Instant presence restore -->
    <script>
    (function(){try{var c=JSON.parse(sessionStorage.getItem('presenceCache'));if(!c||!c.html||Date.now()-c.ts>1800000)return;var l=document.getElementById('header-online-users-list');var s=document.getElementById('header-online-section');var b=document.getElementById('community-status-bar');if(l&&s&&b){l.innerHTML=c.html;s.classList.remove('hidden');b.classList.remove('hidden')}}catch(e){}})();
    </script>

    <!-- Back to Songs and Poems Button -->
    <div class="container mx-auto px-4 py-4">
        <a href="/songs/" class="back-to-songs-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to Songs and Poems
        </a>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 pb-8">
        <!-- Loading State -->
        <div id="loading-state" class="song-detail-loading">
            <div class="loading-spinner"></div>
            <p>Loading details...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="song-detail-error hidden">
            <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h2>Entry Not Found</h2>
            <p>We couldn't find the song or poem you're looking for.</p>
            <a href="/songs/" class="error-back-btn">Return to Songs and Poems</a>
        </div>

        <!-- Song Content -->
        <article id="song-content" class="song-detail-container hidden">
            <!-- Song Header -->
            <header class="song-detail-header">
                <div class="song-detail-title-section">
                    <h1 id="song-title" class="song-detail-title"></h1>
                    <div class="song-detail-meta">
                        <p id="song-artist" class="song-detail-artist"></p>
                        <p id="song-date" class="song-detail-date"></p>
                    </div>
                </div>
                <div id="song-overview" class="song-detail-overview"></div>
            </header>

            <!-- Video Section -->
            <section id="video-section" class="song-detail-video-section">
                <h2 class="section-title">
                    <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Watch &amp; Listen
                </h2>
                <div id="video-container" class="video-container">
                    <!-- YouTube embed will be inserted here -->
                </div>
                <div class="video-actions">
                    <a id="youtube-link" href="#" target="_blank" rel="noopener" class="youtube-link">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                        </svg>
                        Open on YouTube
                    </a>
                </div>
            </section>

            <!-- Lyrics / Poem Section -->
            <section id="lyrics-section" class="song-detail-lyrics-section">
                <h2 id="lyrics-section-title" class="section-title">
                    <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span id="lyrics-section-label">Lyrics</span>
                </h2>
                <div id="lyrics-container" class="lyrics-detail-container">
                    <!-- Lyrics will be inserted here -->
                </div>
            </section>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-blue-900 text-white py-6 mt-12 border-t-4 border-blue-700">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm">May these songs and poems deepen your faith</p>
            <p class="text-xs text-blue-300 mt-2">A Letter in the Scroll</p>
        </div>
    </footer>

    <script src="/js/shabbat.js"></script>
    <script src="/js/song-detail.js"></script>
    <script src="/js/header-fallback.js"></script>
    <script src="/js/sidebar-nav.js"></script>
    <script src="/js/text-size-control.js"></script>
    <!-- Shared presence tracking for online status across all pages -->
    <script type="module" src="/js/presence.js"></script>
</body>
</html>
