<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - A Letter in the Scroll</title>
    <link rel="icon" type="image/png" href="/media/images/Icon.png">
    <link rel="apple-touch-icon" href="/media/images/Icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shabbat.css">
    <link rel="stylesheet" href="/css/mobile-overrides.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background:
                radial-gradient(circle at 12% 12%, rgba(37, 99, 235, 0.08), transparent 45%),
                radial-gradient(circle at 88% 10%, rgba(201, 160, 63, 0.1), transparent 40%),
                linear-gradient(180deg, #f6f8fd 0%, #eef3fb 100%);
        }

        .bookmarks-shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.25rem 1rem 3rem;
        }

        .bookmarks-hero {
            background: linear-gradient(138deg, #16285e 0%, #23408f 55%, #2f56ab 100%);
            color: #fff;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.22);
            padding: 2rem 1.6rem;
            position: relative;
            overflow: hidden;
        }

        .bookmarks-hero::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(200, 154, 53, 0.28), transparent 70%);
            top: -90px;
            right: -60px;
            pointer-events: none;
            border-radius: 50%;
        }

        .bookmarks-hero::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(191, 219, 254, 0.2), transparent 70%);
            bottom: -80px;
            left: -50px;
            pointer-events: none;
            border-radius: 50%;
        }

        .hero-eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.65);
            font-weight: 700;
        }

        .hero-title {
            margin-top: 0.45rem;
            font-size: clamp(1.7rem, 3.5vw, 2.5rem);
            font-weight: 700;
            line-height: 1.12;
        }

        .hero-subtitle {
            margin-top: 0.6rem;
            color: rgba(241, 245, 255, 0.88);
            max-width: 58ch;
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
            margin-top: 1.2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            transition: background 0.2s;
        }

        .stat-card:hover { background: rgba(255,255,255,0.13); }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.65);
            font-weight: 700;
        }

        .stat-value {
            margin-top: 0.2rem;
            font-size: 1.45rem;
            font-weight: 700;
            color: #fbbf24;
            line-height: 1.2;
        }

        .bookmarks-panel {
            margin-top: 1.2rem;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(30, 64, 175, 0.1);
            border-radius: 1.4rem;
            box-shadow: 0 20px 50px rgba(30, 64, 175, 0.1);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
        }

        .bookmarks-tabs {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            margin-bottom: 1.1rem;
        }

        .bookmarks-tab {
            border: 1.5px solid rgba(30, 64, 175, 0.18);
            background: rgba(239, 246, 255, 0.7);
            color: #1e3a8a;
            font-size: 0.78rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.4rem 0.85rem;
            transition: all 0.18s ease;
            cursor: pointer;
        }

        .bookmarks-tab.is-active {
            background: linear-gradient(135deg, #16285e, #2f56ab);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(22, 40, 94, 0.3);
        }

        .panel-section {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .panel-section.is-active {
            display: grid;
        }

        /* ── Verse bookmark cards ── */
        .bookmark-card {
            background: #fff;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-left: 4px solid #c89a35;
            border-radius: 1rem;
            padding: 1.1rem 1rem;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bookmark-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1);
        }

        .bookmark-card-head {
            display: flex;
            justify-content: space-between;
            gap: 0.6rem;
            align-items: flex-start;
        }

        .bookmark-title {
            font-weight: 700;
            color: #16285e;
            font-size: 0.93rem;
            line-height: 1.35;
        }

        .bookmark-date {
            color: #94a3b8;
            font-size: 0.68rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .bookmark-body {
            color: #334155;
            line-height: 1.6;
            font-size: 0.87rem;
            flex: 1;
        }

        .bookmark-source {
            color: #475569;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .bookmark-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: auto;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
        }

        .meta-pill {
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.22rem 0.5rem;
            border: 1px solid rgba(200, 154, 53, 0.3);
            background: rgba(251, 191, 36, 0.08);
            color: #92650a;
            letter-spacing: 0.02em;
        }

        /* ── Quote bookmark cards ── */
        .quote-card {
            border-left-color: #2f56ab;
        }

        .quote-hebrew {
            direction: rtl;
            text-align: right;
            font-family: 'Times New Roman', 'David', serif;
            font-size: 1.05rem;
            color: #16285e;
            line-height: 1.7;
            background: rgba(239, 246, 255, 0.6);
            border-radius: 0.5rem;
            padding: 0.5rem 0.65rem;
        }

        .quote-reflection {
            font-style: italic;
            color: #475569;
            font-size: 0.84rem;
            border-left: 3px solid rgba(200, 154, 53, 0.35);
            padding-left: 0.65rem;
        }

        /* ── Community cards ── */
        .community-card {
            background: linear-gradient(160deg, #f0f7ff 0%, #e8f1fd 100%);
            border-left-color: #7c3aed;
        }

        .savers-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
            margin-top: 0.4rem;
        }

        .saver-av {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #16285e, #2f56ab);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(22,40,94,0.2);
            flex-shrink: 0;
        }

        .saver-names {
            font-size: 0.78rem;
            color: #374151;
            font-weight: 500;
        }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 3rem 1.5rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .empty-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(239, 246, 255, 0.9);
            border: 1.5px dashed rgba(148, 163, 184, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.9rem;
        }

        .empty-state p { font-size: 0.88rem; max-width: 34ch; line-height: 1.5; }

        /* ── Loading ── */
        .loading-state {
            text-align: center;
            color: #334155;
            padding: 2.5rem 1rem;
            font-size: 0.9rem;
            grid-column: 1 / -1;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 3px solid rgba(148, 163, 184, 0.35);
            border-top-color: #16285e;
            margin: 0 auto 0.75rem;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .panel-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="min-h-screen">
<div id="shared-header-mount"></div>
    <script src="/js/shared-header.js"></script>

    <main class="bookmarks-shell">
        <section class="bookmarks-hero">
            <div class="hero-eyebrow">Your Saved Collection</div>
            <h2 class="hero-title">Bookmarks Across All Your Chavrutot</h2>
            <p class="hero-subtitle">Every verse and daily teaching you saved is collected here in one clean space, synced across your study rooms.</p>
            <div class="stats-grid">
                <article class="stat-card">
                    <p class="stat-label">Verse Bookmarks</p>
                    <p id="stat-verses" class="stat-value">0</p>
                </article>
                <article class="stat-card">
                    <p class="stat-label">Quote Bookmarks</p>
                    <p id="stat-quotes" class="stat-value">0</p>
                </article>
                <article class="stat-card">
                    <p class="stat-label">Community Quotes</p>
                    <p id="stat-community" class="stat-value">0</p>
                </article>
            </div>
        </section>

        <section class="bookmarks-panel">
            <div class="bookmarks-tabs" role="tablist" aria-label="Bookmark sections">
                <button type="button" class="bookmarks-tab is-active" data-tab="verses" role="tab" aria-selected="true">Verses</button>
                <button type="button" class="bookmarks-tab" data-tab="quotes" role="tab" aria-selected="false">Daily Quotes</button>
                <button type="button" class="bookmarks-tab" data-tab="community" role="tab" aria-selected="false">Community</button>
            </div>

            <div id="bookmarks-loading" class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading your universal bookmarks...</p>
            </div>

            <section id="panel-verses" class="panel-section is-active" role="tabpanel"></section>
            <section id="panel-quotes" class="panel-section" role="tabpanel"></section>
            <section id="panel-community" class="panel-section" role="tabpanel"></section>
        </section>
    </main>

    <script type="module">
        import {
            initAuth,
            getCurrentUserId,
            getUserBookmarks,
            getUserDailyQuoteBookmarks,
            getCommunityQuoteBookmarks,
            getUserChavrutaIds
        } from '/js/firebase.js';

        function escapeHtml(value) {
            if (value == null) {
                return '';
            }
            const div = document.createElement('div');
            div.textContent = String(value);
            return div.innerHTML;
        }

        function formatDisplayName(raw) {
            if (!raw) {
                return 'Friend';
            }
            const asString = String(raw).trim();
            if (!asString) {
                return 'Friend';
            }
            const base = asString.includes('@') ? asString.split('@')[0] : asString;
            const normalized = base.replace(/[._-]+/g, ' ').replace(/\s+/g, ' ').trim();
            if (!normalized) {
                return 'Friend';
            }
            return normalized
                .split(' ')
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function formatDate(timestamp) {
            if (!timestamp || typeof timestamp.toDate !== 'function') {
                return 'Date unavailable';
            }
            return timestamp.toDate().toLocaleDateString();
        }

        function truncateText(text, maxLength = 260) {
            const value = (text || '').trim();
            if (!value) {
                return '';
            }
            if (value.length <= maxLength) {
                return value;
            }
            return `${value.slice(0, maxLength - 1)}...`;
        }

        function renderEmptyState(message) {
            return `<div class="empty-state">${escapeHtml(message)}</div>`;
        }

        function renderVerseBookmarks(bookmarks) {
            if (!bookmarks || bookmarks.length === 0) {
                return `<div class="empty-state">
                    <div class="empty-icon">
                        <svg width="22" height="22" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                    </div>
                    <p>No verse bookmarks yet. Open a study room, tap a verse, and bookmark it to save it here.</p>
                </div>`;
            }

            return bookmarks.map((bookmark) => {
                const reference = bookmark.verseRef || 'Unknown verse';
                const text = truncateText(bookmark.verseText || 'Verse text will appear after you open the study room where this verse was bookmarked.');
                const dateStr = formatDate(bookmark.timestamp);
                // Extract book name for a subtle accent
                const book = reference.split(' ')[0] || '';
                return `
                    <article class="bookmark-card">
                        <div class="bookmark-card-head">
                            <h3 class="bookmark-title">${escapeHtml(reference)}</h3>
                            <span class="bookmark-date">${escapeHtml(dateStr)}</span>
                        </div>
                        <p class="bookmark-body">${escapeHtml(text)}</p>
                        <div class="bookmark-meta">
                            <span class="meta-pill">Universal Bookmark</span>
                            ${book ? `<span class="meta-pill">${escapeHtml(book)}</span>` : ''}
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderQuoteBookmarks(bookmarks) {
            if (!bookmarks || bookmarks.length === 0) {
                return `<div class="empty-state">
                    <div class="empty-icon">
                        <svg width="22" height="22" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <p>No daily teaching bookmarks yet. Bookmark a daily quote from the dashboard to save it here.</p>
                </div>`;
            }

            return bookmarks.map((bookmark) => {
                const translation = truncateText(bookmark.translation || 'Daily teaching');
                const hebrew = truncateText(bookmark.hebrew || '', 180);
                const reflection = truncateText(bookmark.reflection || '', 240);
                const dateStr = formatDate(bookmark.timestamp);
                return `
                    <article class="bookmark-card quote-card">
                        <div class="bookmark-card-head">
                            <h3 class="bookmark-title">${escapeHtml(bookmark.source || 'Daily Teaching')}</h3>
                            <span class="bookmark-date">${escapeHtml(dateStr)}</span>
                        </div>
                        ${hebrew ? `<p class="quote-hebrew">${escapeHtml(hebrew)}</p>` : ''}
                        <p class="bookmark-body">"${escapeHtml(translation)}"</p>
                        ${reflection ? `<p class="quote-reflection">${escapeHtml(reflection)}</p>` : ''}
                        <div class="bookmark-meta">
                            <span class="meta-pill">Daily Teaching</span>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderCommunityQuotes(quotes) {
            if (!quotes || quotes.length === 0) {
                return `<div class="empty-state">
                    <div class="empty-icon">
                        <svg width="22" height="22" fill="none" stroke="#94a3b8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
                    </div>
                    <p>No community activity yet. When chavruta members bookmark daily quotes, they will appear here.</p>
                </div>`;
            }

            const colors = ['#16285e','#7c3aed','#c89a35','#27a769','#e74c3c'];
            return quotes.map((quote) => {
                const translation = truncateText(quote.translation || 'Daily teaching');
                const savers = Array.isArray(quote.savers) && quote.savers.length ? quote.savers : [];
                const countLabel = quote.count === 1 ? '1 person bookmarked this' : `${quote.count} people bookmarked this`;
                const saverAvatars = savers.slice(0, 5).map((name, i) => {
                    const n = formatDisplayName(name);
                    return `<div class="saver-av" style="background:linear-gradient(135deg,${colors[i%5]},${colors[(i+1)%5]})" title="${escapeHtml(n)}">${n[0].toUpperCase()}</div>`;
                }).join('');
                const nameList = savers.slice(0, 3).map(formatDisplayName).join(', ')
                    + (savers.length > 3 ? ` and ${savers.length - 3} more` : '');

                return `
                    <article class="bookmark-card community-card">
                        <div class="bookmark-card-head">
                            <h3 class="bookmark-title">${escapeHtml(quote.source || 'Daily Teaching')}</h3>
                            <span class="bookmark-date">${escapeHtml(countLabel)}</span>
                        </div>
                        <p class="bookmark-body">"${escapeHtml(translation)}"</p>
                        ${quote.reflection ? `<p class="quote-reflection">${escapeHtml(truncateText(quote.reflection, 220))}</p>` : ''}
                        <div class="savers-row">
                            ${saverAvatars}
                            ${nameList ? `<span class="saver-names">${escapeHtml(nameList)}</span>` : ''}
                        </div>
                    </article>
                `;
            }).join('');
        }

        function activateTab(tabName) {
            document.querySelectorAll('.bookmarks-tab').forEach((tab) => {
                const isActive = tab.dataset.tab === tabName;
                tab.classList.toggle('is-active', isActive);
                tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });

            document.querySelectorAll('.panel-section').forEach((panel) => {
                panel.classList.toggle('is-active', panel.id === `panel-${tabName}`);
            });
        }

        function updateStats(verseCount, quoteCount, communityCount) {
            document.getElementById('stat-verses').textContent = String(verseCount || 0);
            document.getElementById('stat-quotes').textContent = String(quoteCount || 0);
            document.getElementById('stat-community').textContent = String(communityCount || 0);
        }

        async function loadBookmarksForUser() {
            const userId = getCurrentUserId();
            if (!userId) {
                return;
            }

            const loading = document.getElementById('bookmarks-loading');
            loading.style.display = 'block';

            try {
                // Pre-warm chavruta cache so all parallel queries share it
                await getUserChavrutaIds(userId);

                // Fire all queries in parallel — cache is already warm
                const [verseBookmarks, quoteBookmarks, communityQuotes] = await Promise.all([
                    getUserBookmarks(userId),
                    getUserDailyQuoteBookmarks(userId),
                    getCommunityQuoteBookmarks()
                ]);

                document.getElementById('panel-verses').innerHTML = renderVerseBookmarks(verseBookmarks || []);
                document.getElementById('panel-quotes').innerHTML = renderQuoteBookmarks(quoteBookmarks || []);
                document.getElementById('panel-community').innerHTML = renderCommunityQuotes(communityQuotes || []);

                updateStats(
                    (verseBookmarks || []).length,
                    (quoteBookmarks || []).length,
                    (communityQuotes || []).length
                );
            } catch (error) {
                console.error('Failed to load bookmarks:', error);
                const fallback = renderEmptyState('Could not load bookmarks right now. Please refresh in a moment.');
                document.getElementById('panel-verses').innerHTML = fallback;
                document.getElementById('panel-quotes').innerHTML = fallback;
                document.getElementById('panel-community').innerHTML = fallback;
            } finally {
                loading.style.display = 'none';
            }
        }

        document.querySelectorAll('.bookmarks-tab').forEach((tab) => {
            tab.addEventListener('click', () => activateTab(tab.dataset.tab));
        });

        initAuth(async (user) => {
            if (!user) {
                return;
            }
            await loadBookmarksForUser();
        });
    </script>
    <script src="/js/header-fallback.js"></script>
    <script src="/js/sidebar-nav.js"></script>
    <script type="module" src="/js/page-auth.js"></script>
</body>
</html>
